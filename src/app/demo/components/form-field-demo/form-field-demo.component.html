<main class="page">
  <h1>Form Field</h1>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <app-form-field label="Name" hint="Type your full name" [error]="submitted && !name.value ? 'Name is required' : ''">
      <input class="input" [formControl]="name" placeholder="Jane Doe" />
    </app-form-field>

    <div class="row">
      <cb-button type="submit">Submit</cb-button>
    </div>
  </form>
</main>
