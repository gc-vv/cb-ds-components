<label class="field">
  @if (label()) {
    <span class="field__label">{{ label() }}</span>
  }

  <span class="field__control">
    <ng-content />
  </span>

  @if (error()) {
    <span class="field__error">{{ error() }}</span>
  } @else if (hint()) {
    <span class="field__hint">{{ hint() }}</span>
  }
</label>
