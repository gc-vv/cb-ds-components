<button
  class="btn"
  [class.btn--primary]="variant() === 'primary'"
  [class.btn--secondary]="variant() === 'secondary'"
  [class.btn--tertiary]="variant() === 'tertiary'"
  [class.btn--conversion]="variant() === 'conversion'"
  [disabled]="disabled()"
  [attr.type]="type()"
>
  <ng-content />
</button>
