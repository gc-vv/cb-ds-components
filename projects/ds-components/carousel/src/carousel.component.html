<div
  [ngClass]="[
    'carousel',
    'carousel--controls-' + controlsPosition(),
    sidePadding() ? 'carousel--side-padding' : '',
    withGutter() ? 'carousel--gutter' : '',
    draggable() ? 'carousel--draggable' : '',
    className()
  ]"
>
  <div class="carousel__viewport"
    (mousedown)="onMouseDown($event)"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
  >
    <div class="carousel__track" #track [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'">
      <ng-content></ng-content>
    </div>
  </div>

  <!-- Controls -->
  <ng-container *ngIf="withControls()">
    <button
      *ngIf="showPrev"
      type="button"
      class="carousel__control carousel__control--prev"
      (click)="prev()"
      aria-label="Slide anterior"
    >
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button
      *ngIf="showNext"
      type="button"
      class="carousel__control carousel__control--next"
      (click)="next()"
      aria-label="Próximo slide"
    >
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1L8.5 8L1.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </ng-container>

  <!-- AutoPlay button -->
  <ng-container *ngIf="autoPlay()">
    <button
      type="button"
      class="carousel__autoplay"
      (click)="toggleAutoPlay()"
      [attr.aria-label]="isPlaying() ? 'Pausar' : 'Reproduzir'"
    >
      <svg *ngIf="isPlaying()" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="1" width="3.5" height="12" rx="1" fill="currentColor"/>
        <rect x="8.5" y="1" width="3.5" height="12" rx="1" fill="currentColor"/>
      </svg>
      <svg *ngIf="!isPlaying()" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 1.5L12.5 7L2.5 12.5V1.5Z" fill="currentColor"/>
      </svg>
    </button>
  </ng-container>

  <!-- Indicators -->
  <div *ngIf="withIndicators()" class="carousel__indicators">
    <button
      *ngFor="let idx of indicatorCount"
      type="button"
      [ngClass]="['carousel__dot', currentIndex() === idx ? 'carousel__dot--active' : '']"
      (click)="goTo(idx)"
      [attr.aria-label]="'Ir para slide ' + (idx + 1)"
    ></button>
  </div>
</div>
