<div
  [ngClass]="[
    'date-picker',
    isInvalid() ? 'date-picker--invalid' : '',
    isDisabled() ? 'date-picker--disabled' : '',
    isReadOnly() ? 'date-picker--readonly' : '',
    className()
  ]"
>
  <!-- Label -->
  <label
    *ngIf="label()"
    [attr.for]="id() || 'cb-date-picker'"
    [ngClass]="[
      'date-picker__label',
      isRequired() && showRequiredIndicator() ? 'date-picker__label--required' : ''
    ]"
  >
    {{ label() }}
    <span *ngIf="isRequired() && showRequiredIndicator()" class="date-picker__required-indicator">*</span>
  </label>

  <!-- Trigger field -->
  <div
    class="date-picker__field"
    [attr.id]="id() || 'cb-date-picker'"
    (click)="toggleCalendar()"
    (blur)="handleBlur()"
    (keydown.enter)="toggleCalendar()"
    (keydown.space)="$event.preventDefault(); toggleCalendar()"
    tabindex="0"
    role="combobox"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="dialog"
  >
    <span
      [ngClass]="[
        'date-picker__display',
        !displayValue() ? 'date-picker__display--placeholder' : ''
      ]"
    >
      {{ displayValue() || placeholder() }}
    </span>

    <span class="date-picker__icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </span>
  </div>

  <!-- Calendar popup -->
  <div *ngIf="isOpen()" class="date-picker__calendar" role="dialog" aria-label="Calendário">
    <!-- Header -->
    <div class="date-picker__header">
      <button
        type="button"
        class="date-picker__nav-btn"
        (click)="prevMonth()"
        aria-label="Mês anterior"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <span class="date-picker__month-label">{{ monthLabel() }}</span>

      <button
        type="button"
        class="date-picker__nav-btn"
        (click)="nextMonth()"
        aria-label="Próximo mês"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>

    <!-- Weekday headers -->
    <div class="date-picker__weekdays">
      <span *ngFor="let wd of WEEKDAYS" class="date-picker__weekday">{{ wd }}</span>
    </div>

    <!-- Days grid -->
    <div class="date-picker__days">
      <button
        *ngFor="let day of calendarDays()"
        type="button"
        [ngClass]="[
          'date-picker__day',
          day.isToday && !day.isSelected ? 'date-picker__day--today' : '',
          day.isSelected ? 'date-picker__day--selected' : '',
          day.isOutside ? 'date-picker__day--outside' : '',
          day.isDisabled ? 'date-picker__day--disabled' : ''
        ]"
        [disabled]="day.isDisabled"
        [attr.aria-pressed]="day.isSelected"
        (click)="selectDay(day)"
      >
        {{ day.date.getDate() }}
      </button>
    </div>
  </div>

  <!-- Helper Text -->
  <div *ngIf="helperText() && !isInvalid()" class="date-picker__helper-text">
    {{ helperText() }}
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage() && isInvalid()" class="date-picker__error-message" role="alert">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M7 4.5V7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="7" cy="9.5" r="0.75" fill="currentColor"/>
    </svg>
    {{ errorMessage() }}
  </div>
</div>
