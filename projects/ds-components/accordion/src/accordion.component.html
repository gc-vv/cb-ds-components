<div class="accordion" [class]="className() ? 'accordion ' + className() : 'accordion'">
  @for (item of items(); track $index) {
    <div class="accordion__item" [class.accordion__item--expanded]="isExpanded($index)">
      <ng-container [ngSwitch]="headingLevel()">
        <h2 *ngSwitchCase="'h2'" class="accordion__heading">
          <button
            type="button"
            class="accordion__trigger"
            [attr.aria-expanded]="isExpanded($index)"
            [attr.aria-controls]="getPanelId($index)"
            [id]="getButtonId($index)"
            (click)="toggle($index)"
          >
            <span class="accordion__title">{{ item.title }}</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
        </h2>

        <h3 *ngSwitchCase="'h3'" class="accordion__heading">
          <button
            type="button"
            class="accordion__trigger"
            [attr.aria-expanded]="isExpanded($index)"
            [attr.aria-controls]="getPanelId($index)"
            [id]="getButtonId($index)"
            (click)="toggle($index)"
          >
            <span class="accordion__title">{{ item.title }}</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
        </h3>

        <h4 *ngSwitchCase="'h4'" class="accordion__heading">
          <button
            type="button"
            class="accordion__trigger"
            [attr.aria-expanded]="isExpanded($index)"
            [attr.aria-controls]="getPanelId($index)"
            [id]="getButtonId($index)"
            (click)="toggle($index)"
          >
            <span class="accordion__title">{{ item.title }}</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
        </h4>

        <h5 *ngSwitchCase="'h5'" class="accordion__heading">
          <button
            type="button"
            class="accordion__trigger"
            [attr.aria-expanded]="isExpanded($index)"
            [attr.aria-controls]="getPanelId($index)"
            [id]="getButtonId($index)"
            (click)="toggle($index)"
          >
            <span class="accordion__title">{{ item.title }}</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
        </h5>

        <h6 *ngSwitchCase="'h6'" class="accordion__heading">
          <button
            type="button"
            class="accordion__trigger"
            [attr.aria-expanded]="isExpanded($index)"
            [attr.aria-controls]="getPanelId($index)"
            [id]="getButtonId($index)"
            (click)="toggle($index)"
          >
            <span class="accordion__title">{{ item.title }}</span>
            <span class="accordion__chevron" aria-hidden="true"></span>
          </button>
        </h6>
      </ng-container>

      <div
        class="accordion__panel"
        role="region"
        [id]="getPanelId($index)"
        [attr.aria-labelledby]="getButtonId($index)"
        [hidden]="!isExpanded($index)"
      >
        <div class="accordion__content">{{ item.content }}</div>
      </div>
    </div>
  }
</div>
