<div
  [ngClass]="[
    'input-stepper',
    disabled() ? 'input-stepper--disabled' : '',
    className()
  ]"
>
  <!-- Decrement Button -->
  <button
    type="button"
    class="input-stepper__button input-stepper__button--decrement"
    [disabled]="isDecrementDisabled()"
    (click)="decrement()"
    aria-label="Diminuir"
  >
    <svg
      width="16"
      height="16"
      viewBox="0 0 16 16"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M3 8H13"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <!-- Input Field -->
  <input
    type="number"
    class="input-stepper__field"
    [id]="id()"
    [value]="value()"
    [min]="min()"
    [max]="max()"
    [step]="step()"
    [disabled]="disabled()"
    (input)="handleInputChange($event)"
    (blur)="handleBlur()"
    aria-label="Valor numérico"
  />

  <!-- Increment Button -->
  <button
    type="button"
    class="input-stepper__button input-stepper__button--increment"
    [disabled]="isIncrementDisabled()"
    (click)="increment()"
    aria-label="Aumentar"
  >
    <svg
      width="16"
      height="16"
      viewBox="0 0 16 16"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M8 3V13M3 8H13"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  </button>
</div>
